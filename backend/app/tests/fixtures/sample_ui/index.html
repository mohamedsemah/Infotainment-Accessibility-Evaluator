<!doctype html>
<html>
  <head>
    <title>Sample Infotainment UI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Car Dashboard</h1>
    </header>
    
    <main>
      <section class="controls">
        <img src="car.png" alt="">
        <p class="info">Low contrast text</p>
        <button class="tiny-btn">OK</button>
        <button class="nav-btn">Navigate</button>
      </section>
      
      <section class="media">
        <img src="music-icon.png">
        <div class="playlist">
          <p>Now Playing</p>
          <button class="play-btn">Play</button>
        </div>
      </section>
    </main>
    
    <footer>
      <p>© 2024 Car Company</p>
    </footer>
  </body>
</html>
