version: '3.8'

services:
  backend:
    build: ./backend
    container_name: accessibility-backend
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - MOCK_MODE=${MOCK_MODE:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
    volumes:
      - ./backend:/app
    networks:
      - accessibility-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: accessibility-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - accessibility-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  accessibility-network:
    driver: bridge

volumes:
  backend_data:
